{% extends 'base.html' %}
{% block content %}

<div class="page-section">
  <div class="glass transfer-card">

    <!-- ВИДЖЕТ KIWITAXI -->
    <div id="kiwi-widget">
      <script 
        src="https://tpwgts.com/content?currency=USD&trs=505826&shmarker=707447&locale=ru&powered_by=true&transfer_options_limit=10&transfer_options=MCR%2CBSN%2CECN&disable_currency_selector=false&hide_form_extras=false&hide_external_links=true&campaign_id=1&promo_id=3879"
        charset="utf-8">
      </script>
    </div>

  </div>
</div>

<style>

/* ФОН СТРАНИЦЫ */
body {
  background: linear-gradient(180deg, #f8f6f2, #f1ede7);
}

/* ОСНОВНОЙ БЛОК */
.page-section {
  max-width: 900px;
  margin: 90px auto 120px;
  padding: 0 16px;
  min-height: 70vh;
}

/* КАРТОЧКА */
.transfer-card {
  padding: 20px;
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(14px);
  border-radius: 20px;
}

/* ВИДЖЕТ */
#kiwi-widget {
  margin-top: 10px;
}

.hide-mobile-nav .bottom-nav {
  display: none !important;
}

/* 📱 МОБИЛКА */
@media (max-width: 600px) {
  .page-section {
    margin: 70px auto 100px;
  }
}

</style>

<script>
  const params = new URLSearchParams(window.location.search);

  if (params.get("app") === "1") {
    document.body.classList.add("hide-mobile-nav");
  }
</script>

{% endblock %}
