<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Баннеры — Админка</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">

<style>

body{
    background:#f4f6f9;
    font-family:Arial;
}

.page{
    padding:40px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:35px;
}

.header h2{
    font-size:32px;
    color:#333;
}

.btn-add{
    background:linear-gradient(45deg,#ffb347,#ffcc70);
    padding:14px 24px;
    border-radius:14px;
    text-decoration:none;
    color:white;
    font-weight:600;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(420px,1fr));
    gap:30px;
}

.card{
    background:white;
    border-radius:24px;
    overflow:hidden;
    box-shadow:0 15px 35px rgba(0,0,0,0.08);
    transition:.35s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:260px;
    object-fit:cover;
}

.card-body{
    padding:20px;
}

.title{
    font-size:20px;
    margin-bottom:15px;
    font-weight:600;
}

.btn-delete{
    background:#ff5c5c;
    padding:10px 18px;
    border-radius:12px;
    color:white;
    text-decoration:none;
}

.back{
    margin-bottom:20px;
    display:inline-block;
    color:#777;
}

</style>

</head>

<body>

<div class="page">

<a href="{{ url_for('admin_filter') }}" class="back">← Назад</a>

<div class="header">
    <h2>Баннеры сайта</h2>
    <a href="{{ url_for('add_banner') }}" class="btn-add">+ Добавить баннер</a>
</div>

<div class="grid">

{% for banner in banners %}
<div class="card">

    {% if banner.image %}
    <img src="{{ url_for('static', filename='banners/' + banner.image) }}">
    {% endif %}

    <div class="card-body">

        <div class="title">{{ banner.title }}</div>

        <a href="{{ url_for('delete_banner', id=loop.index0) }}" class="btn-delete">
            Удалить
        </a>

    </div>

</div>
{% endfor %}

</div>

</div>

</body>
</html>
