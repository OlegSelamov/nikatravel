<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Добавить баннер</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">

<style>

body{
    background:#f4f6f9;
    font-family:Arial;
}

.wrapper{
    max-width:600px;
    margin:60px auto;
}

.card{
    background:white;
    padding:35px;
    border-radius:22px;
    box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

h2{
    margin-bottom:25px;
    font-size:28px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:6px;
    color:#555;
    font-weight:600;
}

input[type=file],
input[type=text],
select{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ddd;
    font-size:15px;
}

input:focus,
select:focus{
    outline:none;
    border:1px solid #ffb347;
}

.preview{
    margin-top:15px;
    display:none;
}

.preview img{
    width:100%;
    border-radius:14px;
}

.btn{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(45deg,#ffb347,#ffcc70);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

.back{
    margin-bottom:20px;
    display:inline-block;
    color:#777;
    text-decoration:none;
}

</style>

</head>

<body>

<div class="wrapper">

<a href="/admin/banners" class="back">← Назад к баннерам</a>

<div class="card">

<h2>Добавить баннер</h2>

<form method="POST" enctype="multipart/form-data">

<div class="form-group">
<label>Картинка баннера</label>
<input type="file" name="image" id="imageInput" required>
</div>

<div class="preview" id="preview">
<img id="previewImg">
</div>

<div class="form-group">
<label>Ссылка</label>
<input type="text" name="link" placeholder="/filter" required>
</div>

<div class="form-group">
<label>Позиция баннера</label>
<select name="position" required>
<option value="top">Верхний</option>
<option value="bottom">Нижний</option>
</select>
</div>

<button class="btn">Добавить баннер</button>

</form>

</div>
</div>

<script>
document.getElementById('imageInput').onchange = evt => {
    const [file] = evt.target.files
    if (file){
        document.getElementById('preview').style.display='block'
        document.getElementById('previewImg').src = URL.createObjectURL(file)
    }
}
</script>

</body>
</html>
