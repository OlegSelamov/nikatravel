{% extends 'base.html' %}
{% block content %}
<div class="admin-content">
    <h1>{% if edit %}Редактировать{% else %}Добавить{% endif %} тур</h1>

    <form method="POST" enctype="multipart/form-data">
        <label for="city">Город</label>
        <input type="text" id="city" name="city" value="{{ tour.city if edit else '' }}" required>

        <label for="country">Страна</label>
        <input type="text" id="country" name="country" value="{{ tour.country if edit else '' }}" required>

        <label for="hotel">Отель</label>
        <input type="text" id="hotel" name="hotel" value="{{ tour.hotel if edit else '' }}" required>

        <label for="nights">Ночей</label>
        <input type="number" id="nights" name="nights" value="{{ tour.nights if edit else '' }}" required>

        <label for="food">Питание</label>
        <input type="text" id="food" name="food" value="{{ tour.food if edit else '' }}" required>

        <label for="price">Цена</label>
        <input type="number" id="price" name="price" value="{{ tour.price if edit else '' }}" required>

        <label for="seats">Места</label>
        <input type="text" id="seats" name="seats" value="{{ tour.seats if edit else '' }}" required>

        <label for="image">Изображение</label>
        <input type="file" id="image" name="image">

        <button type="submit">{% if edit %}Обновить{% else %}Добавить{% endif %}</button>
    </form>
</div>
{% endblock %}
